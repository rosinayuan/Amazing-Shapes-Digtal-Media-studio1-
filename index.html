<!DOCTYPE html>
<html>
    
    <head>
    <title>Icon Template Square</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/buzz/1.2.1/buzz.min.js"></script>
    <style>
            .row{
                width:1080px;
                margin: 10px auto 10px auto ;
            }
            .image-container {
                display: table-cell;
                vertical-align: middle;
                padding:20px;
            }
            body{
                background-color: pink;
                background-image: url("img/asset_1.svg");
                background-size: 200px;
                background-repeat: repeat;
            }
    </style>
    </head>

    <body>
        <script>
            var sound1 = new buzz.sound("sound/mugtap.wav")
            var sound2 = new buzz.sound("sound/click.wav")

            window.onload = function(){
                document.getElementById('cirBlu').addEventListener('click', function () {sound1.play();})
                document.getElementById('triOrange').addEventListener('click', function () {sound2.play();})
                
            };
        </script>
        <div class="row">
            <div class="image-container"><img id="cirBlu" src="img/cir.png" onmouseover="this.src='img/Asset 1.svg';" onmouseout="this.src='img/cir.png';" height="200" width="200"/></div>
            <div class="image-container"><img id="triOrange" src="img/tri.png" height="200" width="200" onmousedown="this.src='img/hex.png';" onmouseup="this.src='img/tri.png';"/></div>
            <div class="image-container"><img id="squWhite" src="img/squ.png" height="200" width="200" onmouseover="this.src='img/sta.png';" onmouseout="this.src='img/squ.png';"/></div>
           
        </div>

               <div class="row">
             <div class="image-container"><img src="img/hex.png" height="200" width="200"/></div>
            <div class="image-container"><img src="img/rec.png" height="200" width="200"/></div>
            <div class="image-container"><img src="img/sta.png" height="200" width="200"/></div>
            </div>

        <div class="row">
            <div class="image-container"><img src="img/trr.png" height="200" width="200"/></div>
            <div class="image-container"><img src="img/sqr.png" height="200" width="200"/></div>
            <div class="image-container"><img src="img/her.png" height="200" width="200"/></div>
        </div>
        
    </body>
    
</html>
